spring.application.name=hermnet-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hermnet_blind_db}
spring.datasource.username=${DB_USERNAME:alvaro_admin}
spring.datasource.password=${DB_PASSWORD:alvaro_admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


jwt.secret=${JWT_SECRET:}
jwt.expiration.minutes=${JWT_EXPIRATION_MINUTES:15}

# CORS — orígenes permitidos (separados por coma). Vacío = solo mismo origen.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006}

firebase.service.account.path=src/main/resources/hermnet-6d85d-firebase-adminsdk-fbsvc-fdf1bb4af7.json

app.security.rate-limit.max-requests-per-window=60
app.security.rate-limit.window-seconds=60

app.privacy.data-retention.cleanup-cron=0 0 * * * *
app.privacy.data-retention.mailbox-hours=24
